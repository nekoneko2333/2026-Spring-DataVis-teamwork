<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyx Cosmic Explorer - 宇宙学体数据可视分析</title>
  </head>
  <body>
    <div id="app" data-page="showcase">
      <header id="topbar">
        <div class="brand">
          <div class="logo">N</div>
          <div class="titles">
            <h1>Nyx Cosmic Explorer</h1>
            <p>AMR cosmology volume analysis</p>
          </div>
        </div>

        <nav class="page-tabs" id="pageTabs" aria-label="页面">
          <button data-page="showcase" class="active">展示</button>
          <button data-page="explore">探索</button>
          <button data-page="params">参数</button>
          <button data-page="charts">图表</button>
        </nav>

        <div class="dataset-strip" aria-label="数据摘要">
          <span>128^3</span>
          <span>100 steps</span>
          <span>log density</span>
        </div>
      </header>

      <aside id="left" class="sidebar sidebar-left">
        <section class="panel timeline-panel">
          <header class="panel-head">
            <h2 id="timelinePanelTitle">时间</h2>
            <span id="timelinePanelSub">Time evolution</span>
            <button id="timelineLayout" class="mini-toggle">螺旋</button>
          </header>
          <div class="playback">
            <button id="btnPlay" class="play" title="播放/暂停">▶</button>
            <input type="range" id="timeSlider" min="0" max="99" value="0" />
            <div class="step-readout">
              <span id="stepLabel">t = 0000</span>
              <span id="loadState"></span>
            </div>
          </div>
          <div class="stage-jumps" id="stageJumps" aria-label="阶段跳转">
            <button data-step="0" class="active">初始</button>
            <button data-step="14">片层</button>
            <button data-step="38">丝状</button>
            <button data-step="66">节点</button>
            <button data-step="88">空洞</button>
          </div>
          <div id="timelineChart" class="chart-host"></div>
          <div class="legend-mini" id="timelineLegend"></div>
        </section>

        <section class="panel tf-panel">
          <header class="panel-head">
            <h2 id="tfPanelTitle">视图</h2>
            <span id="tfPanelSub">View preset</span>
          </header>
          <div id="tfEditor" class="chart-host"></div>
          <div class="render-presets" id="renderPresets" aria-label="体渲染预设">
            <button data-preset="structure" class="active">结构</button>
            <button data-preset="evolution">演化</button>
            <button data-preset="dense">高密度</button>
            <button data-preset="void">空洞</button>
          </div>
          <div class="tf-controls">
            <label>密度增益 <input type="range" id="densityScale" min="0.2" max="4" step="0.05" value="1.3" /></label>
            <label>步进精度 <input type="range" id="stepQuality" min="96" max="512" step="16" value="256" /></label>
            <label>等值面 <input type="range" id="isoValue" min="0" max="1" step="0.005" value="0.40" /></label>
          </div>
          <div class="tf-actions">
            <button id="tfRecommend" type="button">恢复推荐值</button>
          </div>
        </section>
      </aside>

      <main id="center" class="workspace">
        <section class="panel viewport-panel">
          <header class="viewport-toolbar">
            <div class="mode-tabs" id="modeTabs">
              <button data-mode="0" class="active">体渲染</button>
              <button data-mode="1">MIP</button>
              <button data-mode="2">等值面</button>
              <button data-mode="3" title="按全局99%固定阈值高亮，跨时间步可比">Top1%</button>
              <button data-mode="4" title="按全局25%固定阈值显示低密度区域">Void</button>
              <button data-mode="5">MC 网格</button>
            </div>

            <div class="top-actions">
              <button id="btnStory" class="action">短片</button>
              <button id="btnExport" class="action">导出</button>
              <button id="btnTopology" class="action active">拓扑</button>
              <button id="btnProbe" class="action">Probe</button>
              <button id="btnAtlas" class="action">Atlas</button>
            </div>
          </header>

          <div id="viewport">
            <canvas id="glcanvas"></canvas>
            <div id="probeHint" class="overlay-hint hidden">点击体数据建立探针视线，ESC 取消</div>
            <div id="viewBadges" class="view-badges"></div>
            <div id="loadingOverlay" class="loading-overlay">
              <div class="spinner"></div>
              <span>加载体数据...</span>
            </div>
          </div>
          <div id="storyCaption" class="story-caption hidden"></div>
        </section>
      </main>

      <aside id="right" class="sidebar sidebar-right">
        <section class="panel stat-panel">
          <header class="panel-head">
            <h2 id="statPanelTitle">状态</h2>
            <span id="statPanelSub">Current step</span>
          </header>
          <div id="statGrid" class="stat-grid"></div>
        </section>

        <section class="panel selection-panel">
          <header class="panel-head">
            <h2>选区统计</h2>
            <span>Brush selection</span>
          </header>
          <div id="selStats" class="sel-stats">框选直方图以筛选体素</div>
        </section>

        <section class="panel morph-panel">
          <header class="panel-head">
            <h2 id="morphPanelTitle">拓扑</h2>
            <span id="morphPanelSub">Cosmic web</span>
          </header>
          <div id="morphBars" class="morph-bars"></div>
          <div class="atlas-controls" id="atlasControls"></div>
        </section>
      </aside>

      <footer id="bottom" class="panel chart-panel">
        <div class="bottom-tabs" id="bottomTabs">
          <button data-tab="hist" class="active">log 密度直方图</button>
          <button data-tab="fingerprint">演化指纹图</button>
          <button data-tab="series">统计量曲线</button>
          <button data-tab="power">功率谱 P(k)</button>
          <button data-tab="probe">探针剖面</button>
        </div>
        <div class="bottom-body">
          <div class="tab-panel active" data-tab="hist">
            <div class="brush-quick" id="brushQuick" title="区间基于全局固定分位数阈值，跨时间步可比">
              <button data-brush="void" title="log rho <= 全局25%分位">Void</button>
              <button data-brush="sheet" title="全局25%~75%分位">Sheet</button>
              <button data-brush="filament" title="全局75%~95%分位">Filament</button>
              <button data-brush="node" title=">= 全局95%分位">Node</button>
              <button data-brush="top1" title=">= 全局99%分位，固定阈值">Top1%</button>
              <button data-brush="top01" title=">= 全局99.9%分位，固定阈值">Top0.1%</button>
              <button data-brush="clear" class="clear">清除</button>
            </div>
            <div id="histChart" class="chart-host"></div>
          </div>
          <div class="tab-panel" data-tab="fingerprint">
            <div id="fingerprintChart" class="chart-host"></div>
          </div>
          <div class="tab-panel" data-tab="series">
            <div id="seriesChart" class="chart-host"></div>
          </div>
          <div class="tab-panel" data-tab="power">
            <div id="powerChart" class="chart-host"></div>
          </div>
          <div class="tab-panel" data-tab="probe">
            <div id="probeChart" class="chart-host"></div>
            <div class="probe-controls" id="probeControls"></div>
          </div>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
